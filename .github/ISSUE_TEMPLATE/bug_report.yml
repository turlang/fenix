name: Relatar problema
description: Informe um comportamento incorreto reproduzível.
title: "[Bug]: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Não inclua chaves de API, arquivos `.env` ou conteúdo privado da campanha.
  - type: input
    id: version
    attributes:
      label: Versão
      placeholder: 0.1.0-alpha.17
    validations:
      required: true
  - type: dropdown
    id: component
    attributes:
      label: Componente
      options:
        - Engine/API
        - Módulo Foundry
        - Narração/IA
        - Áudio
        - Memória e antirrepetição
        - Outro
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Comportamento observado
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Passos para reproduzir
      placeholder: |
        1. Inicie...
        2. Selecione...
        3. Observe...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Comportamento esperado
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Ambiente
      placeholder: Windows 11, Node.js 22, Foundry VTT 13

